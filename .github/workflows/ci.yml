name: Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Dar permisos al script
        run: chmod +x test.sh

      - name: Ejecutar pruebas
        run: ./test.sh
